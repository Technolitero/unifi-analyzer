<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#007acc" stroke="#005999" stroke-width="16"/>

  <!-- Router/Server shape -->
  <rect x="176" y="200" width="160" height="80" rx="8" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Router details -->
  <rect x="190" y="215" width="20" height="15" fill="#333333" rx="2"/>
  <rect x="220" y="215" width="20" height="15" fill="#333333" rx="2"/>
  <rect x="250" y="215" width="20" height="15" fill="#333333" rx="2"/>
  <rect x="280" y="215" width="20" height="15" fill="#333333" rx="2"/>

  <!-- Antennas -->
  <line x1="216" y1="200" x2="216" y2="170" stroke="#333333" stroke-width="3"/>
  <line x1="256" y1="200" x2="256" y2="160" stroke="#333333" stroke-width="3"/>
  <line x1="296" y1="200" x2="296" y2="170" stroke="#333333" stroke-width="3"/>

  <!-- WiFi signal waves -->
  <path d="M 216 170 Q 236 150 256 170 Q 276 150 296 170" stroke="#00ff00" stroke-width="3" fill="none"/>
  <path d="M 206 155 Q 226 135 256 155 Q 286 135 306 155" stroke="#00ff00" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 196 140 Q 216 120 256 140 Q 296 120 316 140" stroke="#00ff00" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Network cables -->
  <path d="M 136 240 L 176 240" stroke="#333333" stroke-width="4"/>
  <path d="M 336 240 L 376 240" stroke="#333333" stroke-width="4"/>
  <path d="M 136 280 L 176 280" stroke="#333333" stroke-width="4"/>
  <path d="M 336 280 L 376 280" stroke="#333333" stroke-width="4"/>

  <!-- Cable connectors -->
  <circle cx="136" cy="240" r="6" fill="#666666"/>
  <circle cx="136" cy="280" r="6" fill="#666666"/>
  <circle cx="376" cy="240" r="6" fill="#666666"/>
  <circle cx="376" cy="280" r="6" fill="#666666"/>

  <!-- Title text -->
  <text x="256" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">UniFi</text>
  <text x="256" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Analyzer</text>
</svg>